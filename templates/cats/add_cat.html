{% extends "base.html" %}

{% block title %}Добавить питомца — KittyGram{% endblock %}

{% block content %}
<section class="med-header">
  <h1>Добавить питомца</h1>
  <p class="eyebrow">Заполни данные питомца</p>
</section>

<section class="workspace">
  <div class="main-flow">
    <form method="post" class="stack-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="primary-button" type="submit">Добавить</button>
    </form>
  </div>
</section>
{% endblock %}
