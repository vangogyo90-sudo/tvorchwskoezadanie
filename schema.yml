        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
components:
  schemas:
    BloodTypeEnum:
      enum:
      - unknown
      - a
      - b
      - ab
      type: string
      description: |-
        * `unknown` - Неизвестно
        * `a` - A
        * `b` - B
        * `ab` - AB
    Cat:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: string
          readOnly: true
        name:
          type: string
          title: Кличка
          maxLength: 80
        birth_date:
          type: string
          format: date
          nullable: true
          title: Дата рождения
        sex:
          allOf:
          - $ref: '#/components/schemas/SexEnum'
          title: Пол
        breed:
          type: string
          title: Порода
          maxLength: 120
        color:
          type: string
          title: Окрас
          maxLength: 80
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Создан
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Обновлен
      required:
      - created_at
      - id
      - name
      - owner
      - updated_at
    CatBrief:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name
    HealthPassport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cat:
          allOf:
          - $ref: '#/components/schemas/Cat'
          readOnly: true
        cat_id:
          type: integer
          writeOnly: true
        microchip_number:
          type: string
          title: Номер микрочипа
          maxLength: 64
        blood_type:
          allOf:
          - $ref: '#/components/schemas/BloodTypeEnum'
          title: Группа крови
        sterilized:
          type: boolean
          title: Стерилизован/кастрирован
        weight_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          title: Вес, кг
        allergies:
          type: string
          title: Аллергии
        chronic_conditions:
          type: string
          title: Хронические заболевания
        veterinarian_name:
          type: string
          title: Ветеринар
          maxLength: 120
        clinic_phone:
          type: string
          title: Телефон клиники
          maxLength: 40
        emergency_notes:
          type: string
          title: Экстренные заметки
        records_count:
          type: integer
          readOnly: true
        upcoming_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Создан
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Обновлен
      required:
      - cat
      - cat_id
      - created_at
      - id
      - records_count
      - upcoming_count
      - updated_at
    HealthRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        passport_id:
          type: integer
          writeOnly: true
        cat:
          allOf:
          - $ref: '#/components/schemas/CatBrief'
          readOnly: true
        created_by:
          type: string
          readOnly: true
        record_type:
          allOf:
          - $ref: '#/components/schemas/RecordTypeEnum'
          title: Тип записи
        title:
          type: string
          title: Название
          maxLength: 160
        event_date:
          type: string
          format: date
          title: Дата события
        next_due_date:
          type: string
          format: date
          nullable: true
          title: Следующий срок
        clinic:
          type: string
          title: Клиника
          maxLength: 160
        doctor:
          type: string
          title: Врач
          maxLength: 120
        weight_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          title: Вес, кг
        description:
          type: string
          title: Описание
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Создана
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Обновлена
      required:
      - cat
      - created_at
      - created_by
      - id
      - passport_id
      - title
      - updated_at
    PaginatedCatList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Cat'
    PaginatedHealthPassportList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/HealthPassport'
    PaginatedHealthRecordList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/HealthRecord'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedCat:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: string
          readOnly: true
        name:
          type: string
          title: Кличка
